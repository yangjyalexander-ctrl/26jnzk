/**
 * 志愿算法核心逻辑
 * 核心规则：
 * 1. 使用2025年统招线（deviation）作为主要参考
 * 2. 冲刺校：偏差线在 [分数, 分数+5] 范围内（略高于自己，最有希望够到的）
 * 3. 稳妥校：偏差线在 [分数-20, 分数-1] 范围内
 * 4. 保底校：偏差线 < 分数-20
 * 5. 所有志愿按2025统招线从高到低排序
 * 6. 排除分数远低于考生的学校（低于考生分数30分以上的不要）
 * 7. 莱芜/钢城区单独划线，不混入市区志愿
 */
//  { ALL_SCHOOLS, CATEGORY, ALL_B_OR_BETTER } from '../data/schools.js';

function checkAllBBetter(history, geography, biology, politics) {
  const levels = [history, geography, biology, politics];
  return levels.every(l => ALL_B_OR_BETTER.includes(l));
}

function isShengZhongdian(score) {
  return score >= 550;
}

function generateVolunteers(score, historyGrade, geoGrade, bioGrade, polGrade, region) {
  const allBBetter = checkAllBBetter(historyGrade, geoGrade, bioGrade, polGrade);
  const shengZhongdianEligible = !allBBetter && isShengZhongdian(score);

  // 根据区域筛选学校
  let eligibleSchools = ALL_SCHOOLS.filter(s => {
    // 莱芜/钢城区只选莱芜线学校
    if (region === 'laiwu' && s.category !== CATEGORY.LAIWANG) return false;
    // 市区不选莱芜线学校
    if (region === 'city' && s.category === CATEGORY.LAIWANG) return false;
    // 等级不够省重点，排除顶尖名校和省重点
    if (shengZhongdianEligible && (s.category === CATEGORY.TOP || s.category === CATEGORY.SHENGZHONGDIAN)) return false;
    // 关键：排除分数远低于考生的学校（低于考生分数30分以上）
    // 这些学校考生完全没必要报，选分数更高的学校
    if (s.deviation < score - 30) return false;
    return true;
  });

  // 按2025统招线从高到低排序（降序）
  eligibleSchools = [...eligibleSchools].sort((a, b) => b.deviation - a.deviation);

  // 冲刺：偏差线 >= 分数 且 <= 分数+5
  const rushSchools = eligibleSchools.filter(s => s.deviation >= score && s.deviation <= score + 5);
  // 稳妥：偏差线在 [分数-20, 分数-1]
  const stableSchools = eligibleSchools.filter(s => s.deviation >= score - 20 && s.deviation < score);
  // 保底：偏差线 < 分数-20
  const backupSchools = eligibleSchools.filter(s => s.deviation < score - 20);

  const rush = rushSchools.slice(0, 2);
  const stable = stableSchools.slice(0, 3);
  const backup = backupSchools.slice(-2);

  const volunteers = [...rush, ...stable, ...backup].slice(0, 7);

  // 不足7所则从剩余学校补齐（仍按降序取最高的）
  while (volunteers.length < 7) {
    const others = eligibleSchools.filter(s => !volunteers.find(v => v.id === s.id));
    if (others.length > 0) {
      volunteers.push(others[0]); // 取最高分的
    } else {
      break;
    }
  }

  return {
    volunteers: volunteers.map((s, i) => ({ ...s, rank: i + 1 })),
    gradeWarning: shengZhongdianEligible,
  };
}

function getDiversionRecommendations(score, region) {
  const minban = ALL_SCHOOLS.filter(s => s.category === CATEGORY.MINBAN && s.deviation <= score + 30 && s.deviation >= 300);
  const zonggao = ALL_SCHOOLS.filter(s => s.category === CATEGORY.PUGAO);
  if (score < 460) {
    return {
      type: 'minban',
      schools: minban,
      message: '分数低于公办普高资格线（460分），建议关注民办高中和综合高中',
    };
  } else if (score >= 460 && score <= 520) {
    return {
      type: 'zonggao',
      schools: zonggao,
      message: '分数段适合综合高中/职普融通，可灵活转换升学路径',
    };
  }
  return { type: null, schools: [], message: ''} 
}

  const [step, setStep] = useState('input');
  const [score, setScore] = useState('');
  const [region, setRegion] = useState('city');
  const [historyGrade, setHistoryGrade] = useState('B');
  const [geoGrade, setGeoGrade] = useState('B');
  const [bioGrade, setBioGrade] = useState('B');
  const [polGrade, setPolGrade] = useState('B');
  const [showGradeWarning, setShowGradeWarning] = useState(false);
  const [shareUnlocked, setShareUnlocked] = useState(false);
  const [showPoster, setShowPoster] = useState(false);
  const [showFriendFull, setShowFriendFull] = useState(false); // 好友码放大

  const result = useMemo(() => {
    const ns = parseInt(score, 10);
    if (isNaN(ns) || ns < 0 || ns > 660) return null;
    return generateVolunteers(ns, historyGrade, geoGrade, bioGrade, polGrade, region);
  }, [score, historyGrade, geoGrade, bioGrade, polGrade, region]);

  const diversion = useMemo(() => {
    const ns = parseInt(score, 10);
    if (isNaN(ns)) return null;
    return getDiversionRecommendations(ns, region);
  }, [score, region]);

  const handleSubmit = () => {
    if (!result) return;
    if (result.gradeWarning) {
      setShowGradeWarning(true);
      setTimeout(() => { setShowGradeWarning(false); setStep('results'); }, 4000);
    } else {
      setStep('results');
    }
  };

  const handleShowPoster = () => {
    setShareUnlocked(true);
    setShowPoster(true);
  };

  return (
    <div className="min-h-screen bg-gradient-to-b from-slate-50 to-blue-50" style={{paddingBottom:"80px"}}>
      <Header />
      <main className="max-w-md mx-auto px-4 py-6">
        {step === 'input' && (
          <InputForm score={score} setScore={setScore} region={region} setRegion={setRegion}
            historyGrade={historyGrade} setHistoryGrade={setHistoryGrade}
            geoGrade={geoGrade} setGeoGrade={setGeoGrade}
            bioGrade={bioGrade} setBioGrade={setBioGrade}
            polGrade={polGrade} setPolGrade={setPolGrade}
            onSubmit={handleSubmit} />
        )}
        {step === 'results' && result && (
          <ResultsPage score={score} region={region} historyGrade={historyGrade} geoGrade={geoGrade}
            bioGrade={bioGrade} polGrade={polGrade}
            result={result} diversion={diversion}
            shareUnlocked={shareUnlocked}
            onUnlock={() => setShareUnlocked(true)}
            onShowPoster={handleShowPoster} />
        )}
      </main>
      {showGradeWarning && <GradeWarning />}
      {showPoster && (
        <div className="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4 overflow-y-auto">
          <div className='bg-white rounded-2xl p-4 max-w-sm w-full shadow-2xl my-8'>
            <div className='flex justify-between items-center mb-3'>
              <h3 className="font-bold text-gray-800">专属志愿海报</h3>
              <button onClick={() => setShowPoster(false)} className="text-gray-400 hover:text-gray-600 text-xl">X</button>
            </div>
            <Poster score={parseInt(score)} region={region}
              history={historyGrade} geo={geoGrade} bio={bioGrade} pol={polGrade}
              volunteers={result.volunteers} />
            <button onClick={() => { alert("海报已保存"); setShowPoster(false); }} className="mt-3 w-full bg-blue-900 text-white py-2 rounded-xl font-semibold hover:bg-blue-800 transition">保存海报</button>
          </div>
        </div>
      )}
      {/* 好友码放大弹窗 */}
      {showFriendFull && (
        <div className="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 p-4">
          <div className='bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl text-center'>
            <h3 className="text-lg font-bold text-gray-800 mb-3">扫码添加专家微信</h3>
            <img src="/wx-friend.png" alt="加好友" className="w-64 h-64 mx-auto rounded-xl shadow-lg border-4 border-blue-900" />
            <p className="text-sm text-gray-500 mt-3">2026志愿填报一对一专家指导</p>
            <button onClick={() => setShowFriendFull(false)} className="mt-4 w-full bg-blue-900 text-white py-2 rounded-xl font-semibold hover:bg-blue-800 transition">关闭</button>
          </div>
        </div>
      )}
      <FooterBar onShowFriend={() => setShowFriendFull(true)} />
    </div>
  );
}

function Header() {
  return (
    <header className="bg-gradient-to-r from-blue-900 to-indigo-800 text-white py-4 px-4 shadow-lg">
      <div className='max-w-md mx-auto'>
        <h1 className="text-xl font-bold text-center">2026年济南市中考志愿填报助手</h1>
        <p className="text-xs text-center text-blue-200 mt-1">基于2024-2025统招线 智能平行志愿推荐</p>
      </div>
    </header>
  );
}

function InputForm({ score, setScore, region, setRegion, historyGrade, setHistoryGrade, geoGrade, setGeoGrade, bioGrade, setBioGrade, polGrade, setPolGrade, onSubmit }) {
  const ns = parseInt(score, 10);
  return (
    <div className="bg-white rounded-2xl shadow-lg p-6 space-y-5">
      <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2">
        <span className="w-8 h-8 bg-blue-900 text-white rounded-full flex items-center justify-center text-sm">1</span>
        考生信息录入
      </h2>
      <div>
        <label className="block text-sm font-medium text-gray-700 mb-1">考生总分（满分660）</label>
        <input type="number" min="0" max="660" value={score} onChange={(e) => setScore(e.target.value)}
          placeholder="请输入您的中考总分"
          className="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition" />
        {ns > 0 && ns < 460 && <p className='text-xs text-red-500 mt-1'>低于2025年公办普高资格线（460分）</p>}
      </div>
      <div>
        <label className="block text-sm font-medium text-gray-700 mb-2">考生所在区域</label>
        <div className="flex gap-3">
          <button onClick={() => setRegion("city")} className={"flex-1 py-2 rounded-xl font-semibold text-sm transition " + (region === "city" ? "bg-blue-900 text-white" : "bg-gray-100 text-gray-600 hover:bg-gray-200")}>济南市区七区</button>
          <button onClick={() => setRegion("laiwu")} className={"flex-1 py-2 rounded-xl font-semibold text-sm transition " + (region === "laiwu" ? "bg-blue-900 text-white" : "bg-gray-100 text-gray-600 hover:bg-gray-200")}>莱芜/钢城区</button>
        </div>
      </div>
      <div>
        <p className="text-sm font-medium text-gray-700 mb-3">四科等级（历史、地理、生物、道法）</p>
        <div className='space-y-3'>
          {[
            { label: '历史等级', val: historyGrade, set: setHistoryGrade },
            { label: '地理等级', val: geoGrade, set: setGeoGrade },
            { label: '生物等级', val: bioGrade, set: setBioGrade },
            { label: '道法等级', val: polGrade, set: setPolGrade },
          ].map((item) => (
            <div key={item.label}>
              <label className="block text-xs text-gray-500 mb-1">{item.label}</label>
              <select value={item.val} onChange={(e) => item.set(e.target.value)}
                className="w-full px-3 py-2 border-2 border-gray-200 rounded-lg outline-none focus:border-blue-500">
                {GRADE_LEVELS.map(g => <option key={g} value={g}>{g}</option>)}
              </select>
            </div>
          ))}
        </div>
      </div>
      <button onClick={onSubmit} disabled={!score || ns < 0 || ns > 660}
        className="w-full bg-gradient-to-r from-blue-900 to-indigo-700 text-white py-3 rounded-xl font-bold text-lg hover:from-blue-800 hover:to-indigo-600 disabled:opacity-50 disabled:cursor-not-allowed transition shadow-lg">
        生成志愿方案
      </button>
      <div className="bg-blue-50 rounded-xl p-4 text-xs text-blue-800 space-y-1">
        <p className="font-semibold">2026年济南中考政策要点：</p>
        <p>满分660分，2024公办普高线450，2025年460分</p>
        <p>数据为济南市区七区第二批次统招分数线</p>
        <p>莱芜、钢城区单独划线，不混入市区志愿</p>
        <p>平行志愿投档，遵循分数优先原则</p>
        <p>副科等级影响省重点及以上学校报考</p>
      </div>
    </div>
  );
}

function ResultsPage({ score, region, historyGrade, geoGrade, bioGrade, polGrade, result, diversion, shareUnlocked, onUnlock, onShowPoster }) {
  const s = parseInt(score);
  const regionLabel = region === "laiwu" ? "莱芜/钢城区" : "济南市区";
  return (
    <div className="space-y-4">
      <div className="bg-gradient-to-r from-blue-900 to-indigo-800 rounded-2xl p-5 text-white shadow-lg">
        <div className='flex justify-between items-center'>
          <div>
            <p className="text-sm text-blue-200">您的中考总分</p>
            <p className="text-4xl font-bold">{score} <span className="text-lg text-blue-300">/ 660</span></p>
            <p className="text-xs text-blue-300 mt-1">{regionLabel}</p>
          </div>
          <div className='text-right'>
            <p className="text-sm text-blue-200">四科等级</p>
            <p className="text-lg">史<span className="font-bold ml-1">{historyGrade}</span> 地<span className="font-bold ml-1">{geoGrade}</span> 生<span className="font-bold ml-1">{bioGrade}</span> 道<span className="font-bold ml-1">{polGrade}</span></p>
          </div>
        </div>
        <div className="mt-3 w-full bg-blue-800 rounded-full h-2">
          <div className='bg-emerald-400 h-2 rounded-full transition-all' style={{ width: String(Math.round(s / 660 * 100)) + '%' }}></div>
        </div>
        <p className="text-xs text-blue-300 mt-1">得分率 {(s / 660 * 100).toFixed(1)}%</p>
      </div>

      <div className="flex items-center justify-between">
        <h2 className="text-lg font-bold text-gray-800">系统招平行志愿推荐</h2>
        <span className="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded-full">共7个志愿</span>
      </div>

      {result.volunteers.map((school, index) => {
        const isBlurred = !shareUnlocked && index < 5;
        const isBackup = index >= 5;
        const cc = getCategoryColor(school.category);
        return (
          <div key={school.id} className={'bg-white rounded-xl shadow-md overflow-hidden border-l-4 ' + cc.border}>
            <div className="p-4">
              <div className="flex items-center gap-2 mb-2">
                <span className={'w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold ' + (isBackup ? 'bg-emerald-500' : isBlurred ? 'bg-gray-400' : 'bg-blue-600')}>
                  {school.rank}
                </span>
                <span className={'text-xs px-2 py-0.5 rounded-full ' + cc.badge}>{school.category}</span>
                {isBlurred && !isBackup && <span className="text-xs text-amber-600 ml-auto">分享解锁</span>}
              </div>
              {isBlurred ? (
                <div className="blur-md select-none">
                  <h3 className="text-base font-bold text-gray-800">{school.name}</h3>
                  <p className="text-sm text-gray-600 mt-1">{school.desc}</p>
                  {school.tags?.length > 0 && (
                    <div className="flex gap-1 mt-2">
                      {school.tags.map(t => <span key={t} className="text-xs bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded">{t}</span>)}
                    </div>
                  )}
                </div>
              ) : (
                <>
                  <h3 className="text-base font-bold text-gray-800">{school.name}</h3>
                  <p className="text-sm text-gray-600 mt-1">{school.desc}</p>
                  {school.tags?.length > 0 && (
                    <div className="flex flex-wrap gap-1 mt-2">
                      {school.tags.map(t => <span key={t} className="text-xs bg-blue-50 text-blue-700 px-1.5 py-0.5 rounded">{t}</span>)}
                    </div>
                  )}
                </>
              )}
              <div className="flex items-center justify-between mt-3 pt-3 border-t border-gray-100">
                <span className="text-xs text-gray-500">2025统招线</span>
                <span className={'text-sm font-bold ' + (school.deviation > s ? 'text-red-500' : school.deviation < s - 20 ? 'text-emerald-500' : 'text-amber-500')}>
                  {school.deviation > s ? '冲刺' : school.deviation < s - 20 ? '保底' : '稳妥'} {school.deviation}分
                </span>
              </div>
            </div>
          </div>
        );
      })}

      {!shareUnlocked && (
        <button onClick={onUnlock}
          className="w-full bg-gradient-to-r from-amber-400 to-orange-500 text-white py-3 rounded-xl font-bold text-base hover:from-amber-500 hover:to-orange-600 transition shadow-lg flex items-center justify-center gap-2">
          分享给家长群/QQ空间，解锁全部志愿方案
        </button>
      )}

      <button onClick={onShowPoster}
        className="w-full bg-white border-2 border-blue-900 text-blue-900 py-3 rounded-xl font-bold text-base hover:bg-blue-50 transition flex items-center justify-center gap-2">
        生成专属志愿海报（含二维码）
      </button>
      <p className="text-center text-sm text-emerald-600 font-semibold">保存即可获得完整志愿表</p>

      {diversion && diversion.schools.length > 0 && (
        <div className="bg-white rounded-2xl shadow-lg p-5 border-2 border-amber-200">
          <h3 className="text-base font-bold text-gray-800 mb-3">升学路径建议</h3>
          <p className='text-sm text-gray-600 mb-4'>{diversion.message}</p>
          {diversion.schools.map(sch => (
            <div key={sch.id} className="border-b border-gray-100 pb-3 last:border-0 last:pb-0 mb-3">
              <div className="flex justify-between items-start">
                <div>
                  <p className="font-semibold text-gray-800">{sch.name}</p>
                  <p className="text-xs text-gray-500">{sch.desc}</p>
                </div>
                <span className="text-xs bg-amber-100 text-amber-800 px-2 py-1 rounded-full whitespace-nowrap ml-2">2025线 {sch.deviation}</span>
              </div>
              {sch.phone && (
                <button className="mt-2 w-full bg-green-600 text-white py-2 rounded-lg text-sm font-semibold hover:bg-green-700 transition">
                  招生办电话：{sch.phone}
                </button>
              )}
            </div>
          ))}
        </div>
      )}

      <div className="bg-gradient-to-r from-blue-900 to-indigo-800 rounded-2xl p-5 text-white text-center shadow-lg">
        <p className="text-sm text-blue-200 mb-2">2026志愿填报疑难诊断</p>
        <p className="text-lg font-bold">一对一专家指导</p>
        <div className="mt-3 flex flex-col items-center">
          <img src="/wx-friend.png" alt="加好友" className="w-36 h-36 rounded-xl shadow-lg border-2 border-white cursor-pointer hover:opacity-80 transition" onClick={() => alert("请在浏览器中点击查看大图")} />
          <p className="text-xs text-blue-200 mt-2">扫码添加专家微信</p>
        </div>
      </div>
    </div>
  );
}

function GradeWarning() {
  return (
    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
      <div className='bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl'>
        <div className='text-center'>
          <div className="text-4xl mb-3">!</div>
          <h3 className="text-lg font-bold text-red-600 mb-2">等级不足提醒</h3>
          <p className='text-sm text-gray-700 leading-relaxed'>
            您的副科等级不足全部B，无法报考省重点及以上学校，建议调整填报策略。
          </p>
          <button className="mt-4 w-full bg-blue-900 text-white py-2 rounded-xl font-semibold hover:bg-blue-800 transition">
            我知道了
          </button>
        </div>
      </div>
    </div>
  );
}

function FooterBar({ onShowFriend }) {
  return (
    <footer className="fixed bottom-0 left-0 right-0 bg-gradient-to-r from-blue-900 to-indigo-800 text-white py-3 px-4 shadow-inner z-40">
      <div className='max-w-md mx-auto flex items-center justify-between gap-3'>
        <div>
          <p className="text-xs text-blue-200">2026志愿填报疑难诊断</p>
          <p className="text-sm font-bold">一对一专家指导</p>
        </div>
        <div className='flex items-center gap-2'>
          <img src="/wx-friend.png" alt="加好友" className="w-12 h-12 rounded-lg border-2 border-white cursor-pointer hover:opacity-80 transition" onClick={onShowFriend} />
        </div>
      </div>
    </footer>
  );
}

function getCategoryColor(category) {
  const map = {
    '顶尖名校': { border: 'border-red-500', badge: 'bg-red-100 text-red-700' },
    '一类省重点': { border: 'border-blue-500', badge: 'bg-blue-100 text-blue-700' },
    '二类城区公办': { border: 'border-indigo-500', badge: 'bg-indigo-100 text-indigo-700' },
    '公办普高及综高兜底': { border: 'border-emerald-500', badge: 'bg-emerald-100 text-emerald-700' },
    '全市民办高中': { border: 'border-amber-500', badge: 'bg-amber-100 text-amber-700' },
    '莱芜/钢城区': { border: 'border-purple-500', badge: 'bg-purple-100 text-purple-700' },
  };
  return map[category] || { border: 'border-gray-400', badge: 'bg-gray-100 text-gray-700' };
}


//  { useRef, useEffect, useState } from 'react';

 function Poster({ score, region, history, geo, bio, pol, volunteers }) {
  const canvasRef = useRef(null);
  const [friendImg, setFriendImg] = useState(null);

  // Load the friend QR code image
  useEffect(() => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => setFriendImg(img);
    img.onerror = () => console.warn('Friend QR code not found');
    img.src = '/wx-friend.png';
  }, []);

  useEffect(() => {
    if (!canvasRef.current) return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const W = 400;
    const H = 700;
    canvas.width = W;
    canvas.height = H;

    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#1e3a5f');
    grad.addColorStop(0.5, '#2d5a8e');
    grad.addColorStop(1, '#4a90c4');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    drawJinanWatermark(ctx, W, H);

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center';
    const regionLabel = region === 'laiwu' ? '莱芜/钢城区' : '济南市区';
    ctx.fillText('2026年济南中考志愿规划 - ' + regionLabel, W / 2, 40);
    ctx.font = '11px sans-serif';
    ctx.fillStyle = '#a8d0f0';
    ctx.fillText('官方权威数据 智能平行志愿推荐', W / 2, 60);

    drawCard(ctx, 20, 75, W - 40, 90, '#ffffff');
    ctx.fillStyle = '#1e3a5f';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('考生总分', 35, 100);
    ctx.font = 'bold 30px sans-serif';
    ctx.fillText(score + ' / 660', 35, 133);
    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#666';
    ctx.textAlign = 'right';
    ctx.fillText('史:' + history + '  地:' + geo + '  生:' + bio + '  道:' + pol, W - 35, 100);
    ctx.fillText('得分率 ' + (score / 660 * 100).toFixed(1) + '%', W - 35, 133);

    const listY = 180;
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('推荐志愿方案', 30, listY);

    volunteers.forEach((v, i) => {
      const y = listY + 22 + i * 30;
      const barColor = i < 2 ? '#fee2e2' : i < 5 ? '#dbeafe' : '#d1fae5';
      drawCard(ctx, 20, y - 6, W - 40, 26, barColor);
      ctx.fillStyle = i < 2 ? '#dc2626' : i < 5 ? '#2563eb' : '#059669';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('#' + v.rank, 28, y + 9);
      ctx.fillStyle = '#1e293b';
      ctx.font = '12px sans-serif';
      ctx.fillText(v.name, 50, y + 9);
      ctx.fillStyle = '#64748b';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(v.deviation + '分', W - 28, y + 9);
    });

    // Footer with friend QR code - fill the entire bottom area
    const footerY = listY + 22 + volunteers.length * 30 + 10;
    const footerHeight = H - footerY - 30;
    drawCard(ctx, 20, footerY, W - 40, footerHeight, '#ffffff');
    ctx.fillStyle = '#ef4444';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('扫码锁定你的高中录取概率！', W / 2, footerY + 25);
    ctx.fillStyle = '#64748b';
    ctx.font = '12px sans-serif';
    ctx.fillText('2026年济南中考志愿填报助手', W / 2, footerY + 48);

    // Draw friend QR code image - make it large to fill the space
    if (friendImg) {
      const qrSize = Math.min(180, footerHeight - 70);
      const qrX = (W - qrSize) / 2;
      const qrY = footerY + 60;
      ctx.drawImage(friendImg, qrX, qrY, qrSize, qrSize);
    }

    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('数据来源：济南市区七区第二批次统招线(2024-2025)', W / 2, H - 15);
  }, [score, region, history, geo, bio, pol, volunteers, friendImg]);

  return (
    <div className="flex flex-col items-center">
      <canvas ref={canvasRef} className="rounded-xl shadow-2xl max-w-full" />
      <p className="text-xs text-gray-400 mt-2">长按保存图片分享到朋友圈</p>
    </div>
  );
}

function drawJinanWatermark(ctx, W, H) {
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2;
  const qx = W * 0.8;
  const qy = H * 0.35;
  ctx.beginPath();
  ctx.ellipse(qx, qy + 30, 40, 12, 0, 0, Math.PI * 2);
  ctx.stroke();
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.moveTo(qx + i * 12, qy + 28);
    ctx.quadraticCurveTo(qx + i * 12 + i * 5, qy - 10, qx + i * 12, qy - 30);
    ctx.stroke();
  }
  ctx.beginPath();
  ctx.ellipse(W * 0.15, H * 0.6, 50, 25, -0.3, 0, Math.PI * 2);
  ctx.stroke();
  ctx.font = 'bold 40px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('泉', W * 0.8, H * 0.3);
  ctx.fillText('湖', W * 0.15, H * 0.6);
  ctx.restore();
}

function drawCard(ctx, x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 8);
  ctx.fill();
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
